# Built by vsrupeshkumar
services:
  - type: web
    name: kubryx-lendora
    env: python
    region: oregon
    plan: free
    rootDir: lendoraai/Lendora-AI_IITH-main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.1"
      - key: PORT
        value: "8000"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ARBITRUM_RPC_URL
        sync: false
