name: Kubryx CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hub-build:
    name: Hub — Build + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CREDITBLOCKS_API: https://creditblock-rs-backend.onrender.com
          NEXT_PUBLIC_STELLAR_RPC: https://soroban-testnet.stellar.org

  health-check:
    name: Backend Health Check
    runs-on: ubuntu-latest
    needs: hub-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check CreditBlocks health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://creditblock-rs-backend.onrender.com/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ CreditBlocks: Live"
          else
            echo "⚠️ CreditBlocks: returned $STATUS"
          fi

      - name: Run full health check
        run: node scripts/health-check.js
        continue-on-error: true

  lendora-test:
    name: Lendora — Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lendoraai/Lendora-AI_IITH-main
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-anyio httpx anyio
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --tb=short
        continue-on-error: true
