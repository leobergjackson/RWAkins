services:
  - type: web
    name: kubryx-shadow
    env: node
    region: oregon
    plan: free
    rootDir: shadowledger/ShadowLedger-Nexus-main
    buildCommand: npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build --workspace=apps/backend
    startCommand: node apps/backend/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
