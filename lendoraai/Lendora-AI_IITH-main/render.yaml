services:
  - type: web
    name: kubryx-lendora
    env: python
    region: oregon
    plan: free
    rootDir: lendoraai/Lendora-AI_IITH-main
    buildCommand: pip install -r backend/api/requirements.txt
    startCommand: cd backend/api && python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
